<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro — CONNEXA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/pages.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
<a class="skip-link" href="#conteudo">Ir para o conteúdo</a>

<header class="site-header">
  <div class="container site-header-div">
    <a href="index.html" class="brand">
      <img src="../assets/logo.png" alt="Logo do site Connexa">
    </a>
    <nav class="main-nav" id="main-nav" aria-label="Navegação principal">
      <ul class="main-nav__list">
        <li><a href="../index.html">Início</a></li>
        <li><a href="oportunidades.html">Oportunidades</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="eventos.html">Eventos</a></li>
        <li><a href="negocios.html">Negócios</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
      <div class="header-actions in-nav">
        <a href="login.html" class="btn btn--ghost btn--sm">Entrar</a>
      </div>
    </nav>
    
    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-nav"><span></span></button>
  </div>
</header>

<main id="conteudo">
  <div class="auth-shell">
    <div class="auth-card auth-card--wide">
      <div class="auth-card__logo brand">
        <img src="../assets/logo.png" alt="">
      </div>
      <h1 class="auth-card__title">Crie sua conta gratuita</h1>
      <p class="auth-card__sub">Diga quem você é para personalizarmos sua experiência.</p>

      <form data-form="auth">
        <div class="role-toggle">
          <input type="radio" name="papel" id="role-jovem" data-role-input value="jovem" checked>
          <label for="role-jovem">🎓<br>Jovem</label>

          <input type="radio" name="papel" id="role-empresa" data-role-input value="empresa">
          <label for="role-empresa">💼<br>Empresa</label>

          <input type="radio" name="papel" id="role-empreendedor" data-role-input value="empreendedor">
          <label for="role-empreendedor">🏘️<br>Empreendedor</label>
        </div>

        <div class="form-field--row">
          <div class="form-field">
            <label for="cad-nome">Nome completo</label>
            <input type="text" id="cad-nome" required placeholder="Seu nome">
          </div>
          <div class="form-field">
            <label for="cad-email">E-mail</label>
            <input type="email" id="cad-email" required placeholder="seu@email.com">
          </div>
        </div>

        <div data-role-field="jovem" class="form-field">
          <label for="cad-area">Área de interesse</label>
          <select id="cad-area">
            <option>Marketing</option>
            <option>Tecnologia</option>
            <option>Administrativo</option>
            <option>Design</option>
            <option>Vendas</option>
          </select>
        </div>

        <div data-role-field="empresa" class="form-field" style="display:none;">
          <label for="cad-empresa">Nome da empresa</label>
          <input type="text" id="cad-empresa" placeholder="Razão social ou nome fantasia">
        </div>

        <div data-role-field="empreendedor" class="form-field" style="display:none;">
          <label for="cad-negocio">Nome do negócio</label>
          <input type="text" id="cad-negocio" placeholder="Nome do seu negócio local">
        </div>

        <div class="form-field">
          <label for="cad-senha">Senha</label>
          <input type="password" id="cad-senha" required placeholder="Crie uma senha">
        </div>

        <label class="checkbox-row" style="margin-bottom: var(--space-md);">
          <input type="checkbox" required> Concordo com os termos de uso e a política de privacidade
        </label>

        <button type="submit" class="btn btn--primary btn--block">Criar conta</button>
        <p data-feedback style="display:none; margin-top:1rem; color:var(--color-events); font-weight:600; font-size:0.88rem; text-align:center;"></p>
      </form>

      <p class="auth-card__foot">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </div>
</main>

<script src="../js/main.js"></script>
<script src="../js/pages.js"></script>
</body>
</html>
